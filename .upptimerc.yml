# Upptime config — iPLAYCAFE (.dev brand)  →  status.iplaycafe.dev
# Copy this file as `.upptimerc.yml` into the GitHub repo `iPLAYCAFE-dev/status-dev`
# (created from the upptimejs/upptime template, PUBLIC). See ../README.md + docs/RUNBOOK-STATUS-UPPTIME.md.
# Schema: https://upptime.js.org/docs/configuration

owner: iPLAYCAFE-dev
repo: status-dev

sites:
  # Quackback product-feedback portal (re-hosted on Zeabur, ADR-048 amendment).
  - name: Feedback (Quackback)
    url: https://feedback.iplaycafe.dev/api/health
    expectedStatusCodes:
      - 200
    maxResponseTime: 5000   # ms; slower → "degraded"
  # NOTE: iplaycafe.dev apex has no landing page yet (ADR-048 resolved decision) — add a
  # monitor here once a .dev public surface exists.


status-website:
  cname: status.iplaycafe.dev
  name: iPLAYCAFE Status
  introTitle: "**iPLAYCAFE** service status (.dev)"
  introMessage: Live status of iPLAYCAFE .dev services. Subscribe via the buttons below.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/iPLAYCAFE-dev

# Open the incident GitHub Issue against these users so GitHub emails them on down/up
# (the leak-safe "email alert" path — no SMTP of ours; sidesteps the Bunny block).
assignees:
  - iPLAYCAFE-dev

# Optional richer channels — uncomment + add the repo secret(s), then fill in.
# notifications:
#   - type: slack
#     channel: "#status"   # secret SLACK_WEBHOOK_URL
#   - type: discord        # secret DISCORD_WEBHOOK_URL
